name: Deploy to Production Server

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 수동 배포 가능

env:
  DOCKER_IMAGE: logit-server

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check src/

      - name: Test
        run: uv run pytest tests/ -v --no-cov
        env:
          SECRET_KEY: test-secret-key
          POSTGRES_SERVER: localhost
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          REDIS_URL: redis://localhost:6379
          QDRANT_HOST: localhost
          QDRANT_PORT: "6333"
          OPENAI_API_KEY: test-key
          MCP_JWT_SECRET: test-mcp-jwt-secret
          GOOGLE_CLIENT_ID: test-google-client-id
          GOOGLE_CLIENT_SECRET: test-google-client-secret

  deploy:
    runs-on: ubuntu-latest
    needs: lint-and-test
    environment: production  # GitHub Environment로 승인 단계 추가 가능

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          port: ${{ secrets.PROD_SERVER_PORT || 22 }}
          script: |
            cd ${{ secrets.PROD_APP_PATH }}

            # Pull latest code
            git pull origin main

            # Blue-Green deployment
            chmod +x scripts/deploy.sh
            if [ ! -f .active-color ]; then
              ./scripts/deploy.sh init
            else
              ./scripts/deploy.sh deploy
            fi

            # Cleanup old images
            docker image prune -f

            echo "✅ Production deployment completed!"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          port: ${{ secrets.PROD_SERVER_PORT || 22 }}
          script: |
            sleep 10
            cd ${{ secrets.PROD_APP_PATH }}
            ./scripts/deploy.sh status
            curl -f http://localhost:80/health || exit 1
            echo "✅ Health check passed!"
