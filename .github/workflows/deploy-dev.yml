name: Deploy to Dev Server

on:
  push:
    branches:
      - dev

env:
  DOCKER_IMAGE: logit-server

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check src/

      - name: Test
        run: uv run pytest tests/ -v --no-cov
        env:
          SECRET_KEY: test-secret-key
          POSTGRES_SERVER: localhost
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          REDIS_URL: redis://localhost:6379
          QDRANT_HOST: localhost
          QDRANT_PORT: "6333"
          OPENAI_API_KEY: test-key

  deploy:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          port: ${{ secrets.DEV_SERVER_PORT || 22 }}
          script: |
            cd ${{ secrets.DEV_APP_PATH }}

            # Pull latest code
            git pull origin dev

            # Stop existing containers
            docker compose -f docker-compose.dev.yml down

            # Rebuild and start containers
            docker compose -f docker-compose.dev.yml up -d --build

            # Wait for services to be ready
            sleep 15

            # Run migrations
            docker compose -f docker-compose.dev.yml exec -T app alembic upgrade head

            # Create dev user if not exists
            docker compose -f docker-compose.dev.yml exec -T app python scripts/create_dev_user.py || true

            # Cleanup old images
            docker image prune -f

            echo "✅ Deployment completed!"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          port: ${{ secrets.DEV_SERVER_PORT || 22 }}
          script: |
            sleep 10
            cd ${{ secrets.DEV_APP_PATH }}
            docker compose -f docker-compose.dev.yml ps --status running | grep -q "logit-fastapi" || exit 1
            echo "✅ Health check passed!"
