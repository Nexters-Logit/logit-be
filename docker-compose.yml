include:
  - docker-compose.infra.yml

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logit-fastapi
    command: fastapi dev src/main.py --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
    env_file:
      - .env
    environment:
      - ENVIRONMENT=local
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - logit-network
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - __pycache__/
        - action: rebuild
          path: ./pyproject.toml
