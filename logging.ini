[loggers]
keys=root,sqlalchemy,uvicorn_access

[handlers]
keys=consoleHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_sqlalchemy]
level=WARN
qualname=sqlalchemy
propagate=1

[logger_uvicorn_access]
handlers=
qualname=uvicorn.access
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[formatter_simpleFormatter]
format=[%(levelname)s] %(asctime)s | %(message)s