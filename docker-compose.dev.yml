include:
  - path: docker-compose.infra.yml
    env_file: .env

services:
  caddy:
    image: caddy:2-alpine
    container_name: logit-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - logit-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logit-fastapi
    restart: unless-stopped
    command: fastapi run src/main.py --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
    env_file:
      - .env
    environment:
      - ENVIRONMENT=dev
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - logit-network

volumes:
  caddy_data:
  caddy_config:
