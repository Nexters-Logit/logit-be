include:
  - path: docker-compose.infra.yml
    env_file: .env.prod

services:
  caddy:
    image: caddy:2-alpine
    container_name: logit-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - logit-network

  app-blue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logit-app-blue
    restart: unless-stopped
    command: fastapi run src/main.py --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    env_file:
      - .env.prod
    environment:
      - ENVIRONMENT=production
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - logit-network

  app-green:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logit-app-green
    restart: unless-stopped
    command: fastapi run src/main.py --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    env_file:
      - .env.prod
    environment:
      - ENVIRONMENT=production
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - logit-network

  logit-mcp:
    build:
      context: ../logit-mcp
      dockerfile: Dockerfile
    container_name: logit-mcp
    restart: unless-stopped
    expose:
      - "8001"
    env_file:
      - ../logit-mcp/.env
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - logit-network

volumes:
  caddy_data:
  caddy_config:
